name: timelapse_deeplearning_env
channels:
  - conda-forge
dependencies:
  - conda-forge::python=3.12
  - conda-forge::pip
  - conda-forge::numpy
  - conda-forge::scipy
  - conda-forge::scikit-image
  - conda-forge::tifffile
  - conda-forge::pandas
  - conda-forge::matplotlib
  - conda-forge::ipykernel
  - conda-forge::ipywidgets
  - conda-forge::jupyter
  - conda-forge::nbconvert
  - conda-forge::tqdm
  - conda-forge::pytorch
  - conda-forge::torchvision
  - conda-forge::cudatoolkit
  - conda-forge::cudnn
  - conda-forge::natsort
  - pip:
    - "transformers==4.40.0"
    - pyarrow
    - -e ../utils/
